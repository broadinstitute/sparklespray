name: build

on:
  push:
    paths:
      - "src/**"
      - .github/workflows/build.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/sparklesworker/go.mod

      - name: Run tests
        run: go test ./...
        working-directory: src/sparklesworker

      - name: Build Docker image
        run: docker build -t sparklesworker .
        working-directory: src/sparklesworker
